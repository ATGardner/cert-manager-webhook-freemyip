apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "cert-manager-webhook-freemyip.labels" . | indent 4 }}
---
# Grant the webhook permission to read the ConfigMap containing the Kubernetes
# apiserver's requestheader-ca-certificate (auto-created by the apiserver).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}-webhook-authentication-reader
  namespace: kube-system
  labels:
{{ include "cert-manager-webhook-freemyip.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-freemyip.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Delegate auth decisions to the core apiserver.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}-auth-delegator
  labels:
{{ include "cert-manager-webhook-freemyip.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-freemyip.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Grant cert-manager permission to validate using our APIService.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}-domain-solver
  labels:
{{ include "cert-manager-webhook-freemyip.labels" . | indent 4 }}
rules:
  - apiGroups:
      - {{ .Values.groupName }}
    resources:
      - "*"
    verbs:
      - "create"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}-domain-solver
  labels:
{{ include "cert-manager-webhook-freemyip.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}-domain-solver
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ .Values.certManager.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
---
# Grant the webhook pod read access to its own token Secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}
  labels:
{{ include "cert-manager-webhook-freemyip.labels" . | indent 4 }}
rules:
  - apiGroups:
      - ""
    resourceNames:
      - {{ include "cert-manager-webhook-freemyip.secretName" . | quote }}
    resources:
      - "secrets"
    verbs:
      - "get"
      - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}
  labels:
{{ include "cert-manager-webhook-freemyip.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-freemyip.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# API Priority and Fairness (enabled by default since k8s 1.20).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}-flowcontrol-solver
  labels:
{{ include "cert-manager-webhook-freemyip.labels" . | indent 4 }}
rules:
  - apiGroups:
      - "flowcontrol.apiserver.k8s.io"
    resources:
      - "prioritylevelconfigurations"
      - "flowschemas"
    verbs:
      - "list"
      - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}-flowcontrol-solver
  labels:
{{ include "cert-manager-webhook-freemyip.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cert-manager-webhook-freemyip.fullname" . }}-flowcontrol-solver
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-freemyip.fullname" . }}
    namespace: {{ .Release.Namespace }}
