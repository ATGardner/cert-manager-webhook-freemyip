# groupName identifies the webhook within cert-manager.  Must be unique across
# all webhooks deployed to the same cert-manager instance.
groupName: acme.freemyip.emulatorchen.github.com

logLevel: 2

replicaCount: 1

freemyip:
  token: ""

secret:
  existingSecret: false
  existingSecretName: ""

clusterIssuer:
  email: name@example.com
  staging:
    create: false
  production:
    create: false

image:
  repository: ghcr.io/emulatorchen/cert-manager-webhook-freemyip
  # Defaults to the chart appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

certManager:
  serviceAccountName: cert-manager

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 443

containerPort: 8443

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

nodeSelector: {}
tolerations: []
affinity: {}
